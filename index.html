<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatih Mini Fun Website 😂</title>
  <style>
    body {
      margin: 0;
      font-family: Comic Sans MS, cursive;
      background: linear-gradient(135deg, #ccff99, #ff66cc);
      color: #222;
      text-align: center;
    }

    header {
      padding: 20px;
      background: rgba(255,255,255,0.6);
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .box {
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #ff1493;
    }

    .ascii {
      font-family: monospace;
      white-space: pre;
      font-size: 18px;
      margin-top: 15px;
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header>😂 Fatih Mini Fun Website</header>

  <div class="box">
    <h2>Berita Paling Gila Hari Ini</h2>
    <p id="news">Klik butang untuk dapat berita random!</p>
    <button onclick="randomNews()">Tukar Berita</button>
  </div>

  <div class="box">
    <h2>ASCII Fatih</h2>
    <div class="ascii">
(•_•)
<) )╯  FATIH MODE
 / \
    </div>
  </div>

  <div class="box">
    <h2>Glitch Button 💥</h2>
    <button onclick="glitch()">TEKAN AKU</button>
    <p id="glitchText"></p>
  </div>

  <footer>
    © 2026 Fatih Mini Fun Website 😂
  </footer>

  <script>
    const newsList = [
      "Kucing ASCIICat jadi CEO syarikat tech 😼",
      "Samsung lama hidup semula dan minta update Android 99",
      "Roblox server crash sebab terlalu banyak noob",
      "Fatih jumpa kek pandan di Minecraft biome rahsia",
      "Windows XP masih hidup dalam alam glitch 😭"
    ];

    function randomNews() {
      const i = Math.floor(Math.random() * newsList.length);
      document.getElementById("news").innerText = newsList[i];
    }

    function glitch() {
      document.getElementById("glitchText").innerText =
        "╰(°▽°)╯ GLITCH MODE AKTIF!!! SYSTEM OVERLOAD 💥💻";
      document.body.style.transform = "rotate(" + (Math.random()*5-2.5) + "deg)";
      setTimeout(() => {
        document.body.style.transform = "rotate(0deg)";
      }, 500);
    }
  </script>

</body>
</html>
